services:
  postgres:
    image: postgres:15-alpine
    container_name: ims-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ims_db
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ims_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:latest
    container_name: ims-mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:alpine
    container_name: ims-redis
    ports:
      - "6380:6379"

  backend:
    build: ./backend
    container_name: ims-backend
    restart: always
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "5050:5050"
    environment:
      - PORT=5050
      - REDIS_URL=redis://redis:6379
      - MONGO_URI=mongodb://mongodb:27017/ims_datalake
      - POSTGRES_URL=postgres://user:password@postgres:5432/ims_db
      - GEMINI_API_KEY=AIzaSyB8leaJ7zwJ5DCBZ8xQkhsMyj0YPeyk2qY
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: ims-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  mongodb_data: